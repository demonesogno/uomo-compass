<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uomo-Compass 🧭</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #0d0d0d; color: #00ff41; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 800px; background: #1a1a1a; padding: 30px; border: 1px solid #00ff41; border-radius: 5px; }
        h1 { text-align: center; text-transform: uppercase; }
        .question { margin-bottom: 25px; padding: 15px; border-left: 3px solid #333; }
        .options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        button.option-btn { padding: 10px; border: 1px solid #444; background: #111; color: #00ff41; cursor: pointer; }
        button.option-btn.selected { background: #00ff41; color: #000; font-weight: bold; }
        #submit-btn { width: 100%; padding: 20px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 30px; }
        
        /* Stile Risultato */
        #result-container { display: none; text-align: center; width: 100%; max-width: 600px; background: #1a1a1a; padding: 20px; border: 1px solid #00ff41; }
        #canvas-wrapper { position: relative; background: white; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        canvas { background: white; }
        .profile-card { padding: 20px; background: #000; border: 2px solid #ff003c; margin-bottom: 20px; }
        .profile-name { font-size: 2.2rem; color: #ff003c; text-transform: uppercase; }
        .action-btns { display: flex; gap: 10px; justify-content: center; }
        .download-btn { background: #ff003c; color: white; padding: 15px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="quiz-container">
    <h1>UOMO-COMPASS 🧭</h1>
    <div id="questions-list"></div>
    <button id="submit-btn" onclick="calculateResult()">ANALIZZA SOGGETTO</button>
</div>

<div id="result-container">
    <div id="capture-area">
        <h2>COORDINATE INDIVIDUATE</h2>
        <div id="canvas-wrapper">
            <canvas id="compassChart" width="500" height="500"></canvas>
        </div>
        <div class="profile-card">
            <div class="profile-name" id="profile-title"></div>
            <p id="profile-desc" style="color: #fff;"></p>
        </div>
    </div>
    <div class="action-btns">
        <button class="download-btn" onclick="downloadImage()">⬇️ SCARICA RISULTATO</button>
        <button onclick="location.reload()" style="background:#444; color:white; border:none; padding:15px; cursor:pointer;">RIFAI</button>
    </div>
</div>

<script>
// === DATI E DOMANDE (Inalterate) ===
    const questions = [
        // ASSE X: BASICO (-) vs ALTERNATIVO (+)
        { q: "Mi sento soddisfatto e appagato nel guardare e commentare partite di calcio maschile.", axis: "x", values: [2, 1, -1, -2] },
        { q: "Trovo che parlare di Dostoevskij sia un buon argomento di conversazione per un primo appuntamento.", axis: "x", values: [-2, -1, 1, 2] },
        { q: "Compro vestiti esclusivamente in mercatini vintage indossati da persone morte almeno da un decennio.", axis: "x", values: [-2, -1, 1, 2] },
        { q: "Meglio il cinema d'autore (in lingua originale con sottotitoli) rispetto a un film di supereroi della Marvel.", axis: "x", values: [-2, -1, 1, 2] },
        { q: "Artista preferito? Olly.", axis: "x", values: [2, 1, -1, -2] },
        { q: "Adoro andare in vacanza con i bro a Gallipoli, Mykonos e Ibiza.", axis: "x", values: [2, 1, -1, -2] },
        { q: "È normalissimo affittare una nana per un addio al celibato.", axis: "x", values: [2, 1, -1, -2] },
        { q: "Vado ad Amsterdam per le cannette e i musei, MICA PER LE MIGNOTTE.", axis: "x", values: [-2, -1, 1, 2] },
        { q: "Ho votato NO al referendum sulla giustizia.", axis: "x", values: [2, 1, -1, -2] },
        { q: "Stasera pizza? No scusami fra sono in cut.", axis: "x", values: [2, 1, -1, -2] },

        // ASSE Y: INCONSAPEVOLE (-) vs CONSAPEVOLE (+)
        { q: "Mi è capitato di usare un mio trauma infantile o una mia insicurezza per far colpo o giustificare un comportamento di merda.", axis: "y", values: [-2, -1, 1, 2] },
        { q: "Quando scelgo una foto per IG, la analizzo per capire esattamente che tipo di 'vibe' comunica ai follower.", axis: "y", values: [-2, -1, 1, 2] },
        { q: "Non mi rendo quasi mai conto di stare esagerando con i racconti o di annoiare chi mi ascolta.", axis: "y", values: [2, 1, -1, -2] },
        { q: "Faccio autoironia feroce sui miei difetti solo per togliere agli altri il potere di usarli contro di me.", axis: "y", values: [-2, -1, 1, 2] },
        { q: "Uso termini come 'patriarcato' o 'gaslighting' perché so che mi fanno svoltare con le ragazze di sinistra.", axis: "y", values: [-2, -1, 1, 2] },
        { q: "Le mie ex sono tutte 'pazze' o 'psicopatiche': io sono sempre stato quello equilibrato.", axis: "y", values: [-2, -1, 1, 2] },
        { q: "NON SI PUÒ PIÙ DIRE NIENTE!!!!", axis: "y", values: [2, 1, -1, -2] },
        { q: "Mi sento realizzato quando posso mostrare a qualcuno le cose che so.", axis: "y", values: [-2, -1, 1, 2] },
        { q: "Quando il partner si arrabbia con me, penso spesso che stia esagerando senza motivo.", axis: "y", values: [-2, -1, 1, 2] },
        { q: "Dico di non essere pronto per una relazione ma mi prendo tutti i benefit senza le responsabilità.", axis: "y", values: [-2, -1, 1, 2] }
    ];

    const userAnswers = {};

    function renderQuestions() {
        const container = document.getElementById('questions-list');
        const labels = ["Per niente", "Poco", "Abbastanza", "Molto"];
        questions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'question';
            div.innerHTML = `<span class="question-text">${i + 1}. ${q.q}</span>`;
            const optDiv = document.createElement('div');
            optDiv.className = 'options';
            q.values.forEach((v, idx) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = labels[idx];
                b.onclick = () => {
                    userAnswers[i] = v;
                    Array.from(optDiv.children).forEach(btn => btn.classList.remove('selected'));
                    b.classList.add('selected');
                };
                optDiv.appendChild(b);
            });
            div.appendChild(optDiv);
            container.appendChild(div);
        });
    }

    function calculateResult() {
        if (Object.keys(userAnswers).length < questions.length) { 
            alert("Rispondi a tutte le domande prima di procedere."); 
            return; 
        }
        let x = 0; let y = 0;
        questions.forEach((q, i) => { 
            if (q.axis === 'x') x += userAnswers[i]; 
            else y += userAnswers[i]; 
        });
        showResult(x, y);
    }

    // === FUNZIONE DI DISEGNO GRAFICO CORRETTA ===
    function showResult(x, y) {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-container').style.display = 'block';
        
        const ctx = document.getElementById('compassChart').getContext('2d');
        
        new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: 'Soggetto',
                    data: [{ x: x, y: y }],
                    backgroundColor: 'red',
                    pointRadius: 12,
                    pointHoverRadius: 15,
                    borderColor: 'black',
                    borderWidth: 2
                }]
            },
            options: {
                aspectRatio: 1, // Mantiene il grafico quadrato
                scales: {
                    x: {
                        min: -20, max: 20,
                        grid: { color: 'rgba(0,0,0,0.6)', lineWidth: 2 }, // Assi neri più marcati
                        ticks: { display: false } // Rimuove i numeri
                    },
                    y: {
                        min: -20, max: 20,
                        grid: { color: 'rgba(0,0,0,0.6)', lineWidth: 2 },
                        ticks: { display: false }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: false },
                    // PLUGIN CHE DISEGNA LO SFONDO PASTELLO PRIMA DEI PUNTI
                    beforeDraw: (chart) => {
                        const {ctx, chartArea: {top, bottom, left, right, width, height}} = chart;
                        const centerX = left + width / 2;
                        const centerY = top + height / 2;

                        // === Colora i quadranti ===
                        
                        // Top-Left: RATTO (Basico Consapevole) -> X+ Y+
                        // Le tue coord sono X+ Y+ per demonesogno e X- Y+ per ratto. Sistemiamo i colori.
                        // Usiamo i colori classici del compass.
                        
                        // Top-Right: DEMONESOGNO (X+, Y+)
                        ctx.fillStyle = '#a6dcef'; // Azzurrino
                        ctx.fillRect(centerX, top, width/2, height/2);

                        // Top-Left: RATTO (X-, Y+)
                        ctx.fillStyle = '#fdfa72'; // Giallino
                        ctx.fillRect(left, top, width/2, height/2);

                        // Bottom-Left: GOBLIN (X-, Y-)
                        ctx.fillStyle = '#c7ea46'; // Verdino
                        ctx.fillRect(left, centerY, width/2, height/2);

                        // Bottom-Right: CITRULLO (X+, Y-)
                        ctx.fillStyle = '#ffb7ce'; // Rosa
                        ctx.fillRect(centerX, centerY, width/2, height/2);
                        
                        // === Testi dei quadranti (Opzionali, ma fanno molto political compass) ===
                        ctx.fillStyle = 'rgba(0,0,0,0.4)';
                        ctx.font = 'bold 15px Courier New';
                        ctx.fillText('RATTO', left + 10, top + 25);
                        ctx.fillText('DEMONESOGNO', right - 100, top + 25);
                        ctx.fillText('GOBLIN', left + 10, bottom - 15);
                        ctx.fillText('CITRULLO', right - 90, bottom - 15);
                    }
                }
            }
        });

        const title = document.getElementById('profile-title');
        const desc = document.getElementById('profile-desc');

        if (x < 0 && y < 0) { 
            title.innerText = "GOBLIN"; 
            desc.innerText = "L'uomo basico puro. Vivi di istinto, calcio e pizza in cut. Se fai una cazzata è perché non ne hai idea. Sei un normie felice, il pilastro della società."; 
        }
        else if (x < 0 && y >= 0) { 
            title.innerText = "RATTO"; 
            desc.innerText = "Basico consapevole. Sei un evitante che mimetizza la sua banalità dietro strategie di manipolazione. Usi il 'non sono pronto' come un'arma di distruzione di massa."; 
        }
        else if (x >= 0 && y >= 0) { 
            title.innerText = "DEMONESOGNO"; 
            desc.innerText = "Alternativo consapevole. Usi Dostoevskij e il patriarcato per svoltare, ma sei un manipolatore di alto livello. Colto, tossico e profondamente evitante."; 
        }
        else { 
            title.innerText = "CITRULLO"; 
            desc.innerText = "L'alternativo smarrito. Compri vestiti di persone morte e parli di cinema polacco, ma sei troppo confuso per manipolare qualcuno. Vive in una nuvola, innocuo."; 
        }
    }

    // === FUNZIONE DI DOWNLOAD (Inalterata) ===
    function downloadImage() {
        html2canvas(document.querySelector("#capture-area")).then(canvas => {
            let link = document.createElement('a');
            link.download = 'risultato_uomo_compass.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    renderQuestions();
</script>
</body>
</html>
