<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UOMO-COMPASS | Analisi Termonucleare</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-red: #ff003c;
            --dark-bg: #0a0a0a;
            --card-bg: #151515;
        }

        body { 
            font-family: 'Courier New', Courier, monospace; 
            background: var(--dark-bg); 
            color: var(--neon-green); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
            line-height: 1.4;
        }

        .container { 
            max-width: 700px; 
            width: 100%;
            background: var(--card-bg); 
            padding: 40px; 
            border: 2px solid var(--neon-green); 
            box-shadow: 10px 10px 0px rgba(0, 255, 65, 0.1);
        }

        h1 { 
            text-align: center; 
            text-transform: uppercase; 
            font-size: 2.5rem;
            letter-spacing: -2px;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--neon-green);
            padding-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .question { 
            margin-bottom: 35px; 
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .question-text {
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: block;
            color: #fff;
        }

        .options { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 5px; 
        }

        button { 
            padding: 12px 5px; 
            background: #000; 
            color: var(--neon-green); 
            border: 1px solid var(--neon-green); 
            cursor: pointer; 
            font-family: inherit; 
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:hover {
            background: var(--neon-green);
            color: #000;
        }

        button.selected { 
            background: var(--neon-green); 
            color: #000; 
            box-shadow: 0 0 15px var(--neon-green);
        }

        #submit-btn { 
            width: 100%; 
            padding: 25px; 
            background: var(--neon-green); 
            color: #000; 
            font-weight: bold; 
            font-size: 1.5rem;
            border: none; 
            cursor: pointer; 
            margin-top: 20px;
        }

        /* --- STILE GRAFICO RISULTATO --- */
        #result-container { display: none; width: 100%; max-width: 700px; text-align: center; }
        
        #capture-area { 
            background: var(--dark-bg); 
            padding: 30px; 
            border: 3px solid var(--neon-green); 
        }

        .compass-wrapper {
            position: relative;
            width: 500px;
            height: 500px;
            margin: 40px auto;
        }

        /* Etichette Assi Brutaliste */
        .axis-label {
            position: absolute;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
        }
        .label-top { top: -30px; left: 50%; transform: translateX(-50%); color: var(--neon-green); }
        .label-bottom { bottom: -30px; left: 50%; transform: translateX(-50%); }
        .label-left { left: -80px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
        .label-right { right: -90px; top: 50%; transform: translateY(-50%) rotate(90deg); }

        #compass-bg {
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, transparent 50%, #a6dcef 50%),
                linear-gradient(to right, #fdfa72 50%, transparent 50%),
                linear-gradient(to right, transparent 50%, #ffb7ce 50%),
                linear-gradient(to right, #c7ea46 50%, transparent 50%);
            background-position: top right, top left, bottom right, bottom left;
            background-size: 100% 50%;
            background-repeat: no-repeat;
            border: 4px solid #fff;
            box-sizing: border-box;
        }

        canvas { position: absolute; top: 0; left: 0; }

        .profile-card { 
            margin-top: 40px;
            padding: 30px; 
            background: #000; 
            border: 3px solid var(--neon-red); 
        }

        .profile-name { font-size: 3rem; color: var(--neon-red); font-weight: 900; margin-bottom: 10px; }
        .profile-desc { color: #fff; font-size: 1.1rem; line-height: 1.6; }

        .btn-group { margin-top: 30px; display: flex; gap: 15px; justify-content: center; }
        .dl-btn { background: var(--neon-red); color: white; padding: 20px 40px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="quiz-container" class="container">
    <h1>UOMO-COMPASS 🧭</h1>
    <p class="subtitle">Protocollo di classificazione maschio alpha/beta/gamma</p>
    <div id="questions-list"></div>
    <button id="submit-btn" onclick="calculateResult()">ESEGUI DIAGNOSI</button>
</div>

<div id="result-container">
    <div id="capture-area">
        <h2 style="color:white; letter-spacing: 5px;">REPORT INDIVIDUALE</h2>
        
        <div class="compass-wrapper">
            <div class="axis-label label-top">Consapevole</div>
            <div class="axis-label label-bottom">Inconsapevole</div>
            <div class="axis-label label-left">Basico</div>
            <div class="axis-label label-right">Alternativo</div>
            
            <div id="compass-bg">
                <canvas id="compassChart" width="500" height="500"></canvas>
            </div>
        </div>

        <div class="profile-card">
            <div id="profile-title" class="profile-name"></div>
            <p id="profile-desc" class="profile-desc"></p>
        </div>
    </div>
    
    <div class="btn-group">
        <button class="dl-btn" onclick="downloadImage()">SCARICA REPORT (PNG)</button>
        <button onclick="location.reload()" style="border-color:#555; color:#888;">RESET</button>
    </div>
</div>

<script>
    const questions = [
        { q: "Mi sento soddisfatto nel guardare e commentare partite di calcio maschile.", axis: "x", values: [2, 1, -1, -2] },
        { q: "Parlare di Dostoevskij è un buon argomento per un primo appuntamento.", axis: "x", values: [-2, -1, 1, 2] },
        { q: "Compro vestiti vintage indossati da morti da almeno un decennio.", axis: "x", values: [-2, -1, 1, 2] },
        { q: "Meglio il cinema d'autore (sub) rispetto ai supereroi Marvel.", axis: "x", values: [-2, -1, 1, 2] },
        { q: "Artista preferito? Olly.", axis: "x", values: [2, 1, -1, -2] },
        { q: "In vacanza con i bro a Gallipoli, Mykonos o Ibiza.", axis: "x", values: [2, 1, -1, -2] },
        { q: "È normale affittare una nana per un addio al celibato.", axis: "x", values: [2, 1, -1, -2] },
        { q: "Ad Amsterdam per i musei, MICA PER LE MIGNOTTE.", axis: "x", values: [-2, -1, 1, 2] },
        { q: "Ho votato NO al referendum sulla giustizia.", axis: "x", values: [2, 1, -1, -2] },
        { q: "Stasera pizza? No scusami fra sono in cut.", axis: "x", values: [2, 1, -1, -2] },
        { q: "Uso un trauma infantile per far colpo o giustificare cazzate.", axis: "y", values: [-2, -1, 1, 2] },
        { q: "Analizzo la 'vibe' delle mie foto IG per i follower.", axis: "y", values: [-2, -1, 1, 2] },
        { q: "Non mi rendo conto di annoiare chi mi ascolta.", axis: "y", values: [2, 1, -1, -2] },
        { q: "Autoironia feroce solo per togliere potere agli altri.", axis: "y", values: [-2, -1, 1, 2] },
        { q: "Uso 'patriarcato' o 'gaslighting' per svoltare a sinistra.", axis: "y", values: [-2, -1, 1, 2] },
        { q: "Le mie ex sono tutte 'pazze' o 'psicopatiche'.", axis: "y", values: [-2, -1, 1, 2] },
        { q: "NON SI PUÒ PIÙ DIRE NIENTE!!!!", axis: "y", values: [2, 1, -1, -2] },
        { q: "Mi sento realizzato quando mostro quanto ne so.", axis: "y", values: [-2, -1, 1, 2] },
        { q: "Se il partner si arrabbia, penso sempre che esageri.", axis: "y", values: [-2, -1, 1, 2] },
        { q: "Voglio i benefit della relazione senza le responsabilità.", axis: "y", values: [-2, -1, 1, 2] }
    ];

    const answers = {};

    function render() {
        const root = document.getElementById('questions-list');
        const labels = ["MAI", "POCO", "SÌ", "MOLTO"];
        questions.forEach((q, i) => {
            const d = document.createElement('div');
            d.className = 'question';
            d.innerHTML = `<span class="question-text">${i+1}. ${q.q}</span><div class="options"></div>`;
            labels.forEach((l, idx) => {
                const b = document.createElement('button');
                b.innerText = l;
                b.onclick = () => {
                    answers[i] = q.values[idx];
                    Array.from(b.parentElement.children).forEach(x => x.classList.remove('selected'));
                    b.classList.add('selected');
                };
                d.querySelector('.options').appendChild(b);
            });
            root.appendChild(d);
        });
    }

    function calculateResult() {
        if (Object.keys(answers).length < 20) return alert("COMPILA TUTTI I CAMPI, SOLDATO.");
        let x = 0, y = 0;
        questions.forEach((q, i) => { if(q.axis=='x') x+=answers[i]; else y+=answers[i]; });
        
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-container').style.display = 'block';

        new Chart(document.getElementById('compassChart'), {
            type: 'scatter',
            data: { datasets: [{ data: [{x:x, y:y}], backgroundColor: 'red', pointRadius: 15, borderColor: 'white', borderWidth: 3 }] },
            options: {
                scales: {
                    x: { min: -20, max: 20, grid: { color: 'rgba(255,255,255,0.2)', lineWidth: 1 }, ticks: { display: false } },
                    y: { min: -20, max: 20, grid: { color: 'rgba(255,255,255,0.2)', lineWidth: 1 }, ticks: { display: false } }
                },
                plugins: { legend: { display: false } }
            }
        });

        const t = document.getElementById('profile-title'), d = document.getElementById('profile-desc');
        if (x < 0 && y < 0) { t.innerText="GOBLIN"; d.innerText="L'uomo basico puro. Vivi di istinto, calcio e pizza in cut. Sei un normie felice, il pilastro della società."; }
        else if (x < 0 && y >= 0) { t.innerText="RATTO"; d.innerText="Basico consapevole. Un evitante che mimetizza la banalità con la manipolazione. Il re del 'non sono pronto'."; }
        else if (x >= 0 && y >= 0) { t.innerText="DEMONESOGNO"; d.innerText="Alternativo consapevole. Usi Dostoevskij per svoltare. Colto, tossico, letale."; }
        else { t.innerText="CITRULLO"; d.innerText="Alternativo smarrito. Tra vinili e nuvole, troppo confuso per far male a qualcuno. Innocuo."; }
    }

    function downloadImage() {
        html2canvas(document.querySelector("#capture-area")).then(canvas => {
            const a = document.createElement('a');
            a.download = 'UOMO-COMPASS-REPORT.png';
            a.href = canvas.toDataURL();
            a.click();
        });
    }

    window.onload = render;
</script>
</body>
</html>
