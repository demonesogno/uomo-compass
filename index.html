<style>
    #canvas-container { 
        position: relative; 
        width: 550px; /* Leggermente più largo per le etichette */
        height: 550px; 
        margin: 20px auto;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Le etichette degli assi */
    .axis-label {
        position: absolute;
        font-weight: bold;
        font-size: 12px;
        color: #fff;
        text-transform: uppercase;
        background: rgba(0,0,0,0.7);
        padding: 2px 8px;
        border-radius: 3px;
        z-index: 5;
    }
    .label-top { top: 0; }
    .label-bottom { bottom: 0; }
    .label-left { left: 0; transform: rotate(-90deg) translateX(-50%); transform-origin: left; }
    .label-right { right: 0; transform: rotate(90deg) translateX(50%); transform-origin: right; }

    #compass-bg {
        width: 500px;
        height: 500px;
        border: 2px solid #555;
        position: relative;
        background-image: 
            linear-gradient(to right, transparent 50%, #a6dcef 50%),
            linear-gradient(to right, #fdfa72 50%, transparent 50%),
            linear-gradient(to right, transparent 50%, #ffb7ce 50%),
            linear-gradient(to right, #c7ea46 50%, transparent 50%);
        background-position: top right, top left, bottom right, bottom left;
        background-size: 100% 50%;
        background-repeat: no-repeat;
    }
</style>

<div id="canvas-container">
    <div class="axis-label label-top">Consapevole (Manipolatore)</div>
    <div class="axis-label label-bottom">Inconsapevole (Genuino)</div>
    <div class="axis-label label-left">Basico (Normie)</div>
    <div class="axis-label label-right">Alternativo (Indie)</div>
    
    <div id="compass-bg">
        <canvas id="compassChart" width="500" height="500"></canvas>
    </div>
</div>

<script>
    // Nella funzione showResult, assicurati che le grid lines siano ben visibili
    // Modifica le opzioni di Chart.js così:
    options: {
        scales: {
            x: { 
                min: -20, max: 20, 
                grid: { color: 'rgba(0,0,0,0.4)', lineWidth: 2 }, 
                ticks: { display: false } 
            },
            y: { 
                min: -20, max: 20, 
                grid: { color: 'rgba(0,0,0,0.4)', lineWidth: 2 }, 
                ticks: { display: false } 
            }
        },
        plugins: { 
            legend: { display: false },
            tooltip: { enabled: false }
        }
    }
</script>
